name: Build Aurora Theme .run (25.12)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest release tag
        id: fetch_latest_tag
        run: |
          latest_tag=$(curl -sk https://api.github.com/repos/eamonxg/luci-theme-aurora/releases/latest | jq -r '.tag_name')
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download Aurora APK
        run: |
          echo "Downloading Aurora Theme APK for ${{ env.LATEST_TAG }}..."
          curl -sk "https://api.github.com/repos/eamonxg/luci-theme-aurora/releases/latest" > releases.txt

          mkdir -p aurora_x86_64 aurora_aarch64_cortex-a53

          apk_url=$(grep "browser_download_url" releases.txt | grep "\.apk" | head -1 | awk -F '"' '{print $4}')

          echo "下载 APK: $apk_url"
          curl --connect-timeout 30 -m 600 -kLo "luci-theme-aurora.apk" "$apk_url"

          cp luci-theme-aurora.apk aurora_x86_64/
          cp luci-theme-aurora.apk aurora_aarch64_cortex-a53/

          echo ""
          echo "=== 检查文件 ==="
          ls -la aurora_x86_64/
          ls -la aurora_aarch64_cortex-a53/

      - name: Create install.sh
        run: |
          cat << 'EOF' > aurora_x86_64/install.sh
          #!/bin/sh
          apk update
          apk add luci-compat
          apk add -q --force-overwrite --clean-protected --allow-untrusted luci-theme-aurora.apk
          rm -rf /tmp/luci-modulecache /tmp/luci-indexcache
          echo "Aurora 主题安装完成，请在系统界面选择 aurora 主题"
          EOF
          chmod +x aurora_x86_64/install.sh
          cp aurora_x86_64/install.sh aurora_aarch64_cortex-a53/install.sh

      - name: Create self-extracting packages
        run: |
          mv aurora_x86_64 makeself/
          mv aurora_aarch64_cortex-a53 makeself/
          cd makeself
          ./makeself.sh aurora_x86_64/ aurora_25.12_${{ env.LATEST_TAG }}_x86_64.run "Aurora Theme Installer (25.12)" ./install.sh
          ./makeself.sh aurora_aarch64_cortex-a53/ aurora_25.12_${{ env.LATEST_TAG }}_aarch64.run "Aurora Theme Installer (25.12)" ./install.sh

      - name: Create release notes
        run: |
          cat > release_notes.md << 'ENDOFFILE'
          ## Aurora 主题 .run (25.12)
          
          一款美观且功能强大的 OpenWrt LuCI 主题，支持多种主题风格切换。
          
          ---
          
          ## 系统要求
          
          - **固件版本**：OpenWrt 或 ImmortalWrt `25.12+`
          - **支持架构**：`x86_64`、`aarch64_cortex-a53`
          - **磁盘空间**：至少 5MB 可用空间
          - **权限要求**：root 权限
          
          ---
          
          ## 功能特性
          
          - **美观界面**：现代化设计风格
          - **多风格切换**：支持多种主题风格切换
          - **响应式布局**：适配桌面和移动设备
          - **自定义颜色**：支持自定义组件颜色
          - **主题设置**：丰富的主题配置选项
          
          ---
          
          ## 安装步骤
          
          ### 通过 SSH 安装
          
          **1. 上传安装包**
          
          方式 A - 使用 SCP（推荐）：
          ```bash
          # x86_64 设备
          scp aurora_25.12_*_x86_64.run root@192.168.1.1:/tmp/
          
          # aarch64 设备
          scp aurora_25.12_*_aarch64.run root@192.168.1.1:/tmp/
          ```
          
          方式 B - 使用 WinSCP/FileZilla：
          - 连接路由器（协议：SCP，端口：22）
          - 将对应的 `.run` 文件上传到 `/tmp/` 目录
          
          **注意**：不要使用 LuCI 的"上传软件包"功能，`.run` 文件不是 APK 包！
          
          **2. 进入临时目录**
          ```bash
          cd /tmp
          ```
          
          **3. 添加执行权限**
          ```bash
          # x86_64 设备
          chmod +x aurora_25.12_*_x86_64.run
          
          # aarch64 设备
          chmod +x aurora_25.12_*_aarch64.run
          ```
          
          **4. 执行安装**
          ```bash
          # x86_64 设备
          ./aurora_25.12_*_x86_64.run
          
          # aarch64 设备
          ./aurora_25.12_*_aarch64.run
          ```
          
          **5. 等待安装完成**
          - 安装过程会自动安装依赖并安装主题
          - 看到安装成功提示后继续下一步
          
          **6. 刷新 LuCI 界面**
          - 退出并重新登录 LuCI
          - 在 **系统 -> 系统** 页面选择 aurora 主题
          
          ---
          
          ## 验证安装
          
          **检查是否安装成功**：
          ```bash
          apk info | grep aurora
          ```
          
          **查看主题文件**：
          ```bash
          ls /www/luci-static/aurora/
          ```
          
          **应用主题**：
          - 登录 LuCI 管理界面
          - 进入 **系统 -> 系统** 页面
          - 在 **主题** 下拉框中选择 `aurora`
          - 点击 **保存并应用**
          
          ---
          
          ## 常见问题
          
          ### Q1: 安装后 LuCI 界面没有变化？
          **A**: 需要手动切换主题：
          1. 进入 **系统 -> 系统** 页面
          2. 在 **主题** 下拉框中选择 `aurora`
          3. 点击 **保存并应用**
          
          ### Q2: 如何恢复默认主题？
          **A**: 
          1. 进入 **系统 -> 系统** 页面
          2. 在 **主题** 下拉框中选择 `bootstrap` 或其他主题
          3. 点击 **保存并应用**
          
          ### Q3: 如何卸载 Aurora 主题？
          **A**: 
          ```bash
          apk del luci-theme-aurora
          ```
          卸载后请切换回其他主题。
          
          ---
          
          ## 注意事项
          
          - **主题切换**：切换主题后建议清除浏览器缓存
          - **兼容性**：部分老旧浏览器可能不支持某些新特性
          
          ENDOFFILE

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: aurora-25.12-${{ env.LATEST_TAG }}
          name: "Aurora Theme 25.12 ${{ env.LATEST_TAG }}"
          body_path: release_notes.md
          files: makeself/aurora_25.12_*.run
