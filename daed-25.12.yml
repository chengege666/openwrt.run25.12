name: Build Daed .run (25.12)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest release tag
        id: fetch_latest_tag
        run: |
          latest_tag=$(curl -sk https://api.github.com/repos/QiuSimons/luci-app-daed/releases/latest | jq -r '.tag_name')
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download Daed APK packages
        run: |
          echo "Downloading Daed APK packages for ${{ env.LATEST_TAG }}..."
          curl -sk "https://api.github.com/repos/QiuSimons/luci-app-daed/releases/latest" > releases.txt

          mkdir -p daed_x86_64 daed_aarch64_cortex-a53

          # 下载 x86_64 的 daed 核心
          daed_x86_64=$(grep "browser_download_url" releases.txt | grep "daed-.*-x86_64-openwrt-25.12.apk" | head -1 | awk -F '"' '{print $4}')
          echo "下载 x86_64 核心: $daed_x86_64"
          curl --connect-timeout 30 -m 600 -kLo "daed_x86_64.apk" "$daed_x86_64"

          # 下载 aarch64_generic 的 daed 核心
          daed_aarch64=$(grep "browser_download_url" releases.txt | grep "daed-.*-aarch64_generic-openwrt-25.12.apk" | head -1 | awk -F '"' '{print $4}')
          echo "下载 aarch64 核心: $daed_aarch64"
          curl --connect-timeout 30 -m 600 -kLo "daed_aarch64.apk" "$daed_aarch64"

          # 下载 luci-app-daed（通用）
          luci_app=$(grep "browser_download_url" releases.txt | grep "luci-app-daed-.*-openwrt-25.12.apk" | head -1 | awk -F '"' '{print $4}')
          echo "下载 luci-app-daed: $luci_app"
          curl --connect-timeout 30 -m 600 -kLo "luci-app-daed.apk" "$luci_app"

          # 下载中文包（通用）
          luci_i18n=$(grep "browser_download_url" releases.txt | grep "luci-i18n-daed-zh-cn-.*-openwrt-25.12.apk" | head -1 | awk -F '"' '{print $4}')
          echo "下载中文包: $luci_i18n"
          curl --connect-timeout 30 -m 600 -kLo "luci-i18n-daed-zh-cn.apk" "$luci_i18n"

          # 复制到对应架构目录
          cp daed_x86_64.apk daed_x86_64/
          cp luci-app-daed.apk daed_x86_64/
          cp luci-i18n-daed-zh-cn.apk daed_x86_64/

          cp daed_aarch64.apk daed_aarch64_cortex-a53/
          cp luci-app-daed.apk daed_aarch64_cortex-a53/
          cp luci-i18n-daed-zh-cn.apk daed_aarch64_cortex-a53/

          echo ""
          echo "=== 检查文件 ==="
          ls -la daed_x86_64/
          ls -la daed_aarch64_cortex-a53/

      - name: Create install.sh
        run: |
          cat << 'EOF' > daed_x86_64/install.sh
          #!/bin/sh
          apk update
          apk add -q --force-overwrite --clean-protected --allow-untrusted daed-*.apk
          apk add -q --force-overwrite --clean-protected --allow-untrusted luci-app-daed.apk
          apk add -q --force-overwrite --clean-protected --allow-untrusted luci-i18n-daed-zh-cn.apk
          echo "Daed 安装完成"
          EOF
          chmod +x daed_x86_64/install.sh
          cp daed_x86_64/install.sh daed_aarch64_cortex-a53/install.sh

      - name: Create self-extracting packages
        run: |
          mv daed_x86_64 makeself/
          mv daed_aarch64_cortex-a53 makeself/
          cd makeself
          ./makeself.sh daed_x86_64/ daed_25.12_${{ env.LATEST_TAG }}_x86_64.run "Daed Installer (25.12)" ./install.sh
          ./makeself.sh daed_aarch64_cortex-a53/ daed_25.12_${{ env.LATEST_TAG }}_aarch64.run "Daed Installer (25.12)" ./install.sh

      - name: Create release notes
        run: |
          cat > release_notes.md << 'ENDOFFILE'
          ## Daed .run (25.12)
          
          一款轻量级、高性能的 OpenWrt 代理插件，支持多种代理协议。
          
          ---
          
          ## 系统要求
          
          - **固件版本**：OpenWrt 或 ImmortalWrt `25.12+`
          - **支持架构**：`x86_64`、`aarch64_cortex-a53`
          - **磁盘空间**：至少 100MB 可用空间
          - **权限要求**：root 权限
          
          ---
          
          ## 功能特性
          
          - **多协议支持**：支持 Shadowsocks、V2Ray、Trojan 等协议
          - **智能分流**：支持规则分流和全局模式
          - **订阅管理**：支持订阅链接自动更新节点
          - **Web 管理**：提供友好的 LuCI 管理界面
          - **高性能**：轻量级设计，资源占用低
          
          ---
          
          ## 安装步骤
          
          ### 通过 SSH 安装
          
          **1. 上传安装包**
          
          方式 A - 使用 SCP（推荐）：
          ```bash
          # x86_64 设备
          scp daed_25.12_*_x86_64.run root@192.168.1.1:/tmp/
          
          # aarch64 设备
          scp daed_25.12_*_aarch64.run root@192.168.1.1:/tmp/
          ```
          
          方式 B - 使用 WinSCP/FileZilla：
          - 连接路由器（协议：SCP，端口：22）
          - 将对应的 `.run` 文件上传到 `/tmp/` 目录
          
          **注意**：不要使用 LuCI 的"上传软件包"功能，`.run` 文件不是 APK 包！
          
          **2. 进入临时目录**
          ```bash
          cd /tmp
          ```
          
          **3. 添加执行权限**
          ```bash
          # x86_64 设备
          chmod +x daed_25.12_*_x86_64.run
          
          # aarch64 设备
          chmod +x daed_25.12_*_aarch64.run
          ```
          
          **4. 执行安装**
          ```bash
          # x86_64 设备
          ./daed_25.12_*_x86_64.run
          
          # aarch64 设备
          ./daed_25.12_*_aarch64.run
          ```
          
          **5. 等待安装完成**
          - 安装过程会自动解压并安装插件
          - 看到安装成功提示后继续下一步
          
          **6. 刷新 LuCI 界面**
          - 退出并重新登录 LuCI
          - 在 **服务** 菜单下找到 **Daed** 入口
          
          ---
          
          ## 验证安装
          
          **检查是否安装成功**：
          ```bash
          apk info | grep daed
          ```
          
          **访问界面**：
          - 在 LuCI 菜单中找到 **服务 -> Daed** 入口
          
          ---
          
          ## 使用方法
          
          **1. 打开 Daed 设置界面**
          - 登录 LuCI 管理界面
          - 找到 **服务 -> Daed** 菜单项
          
          **2. 基本配置**
          - **运行模式**：选择代理模式
          - **监听端口**：设置代理监听端口
          - **DNS 设置**：配置 DNS 解析方式
          
          **3. 订阅管理**
          - 添加订阅链接
          - 更新节点列表
          - 选择可用节点
          
          **4. 保存并应用**
          - 点击 **保存并应用**
          - 重启 Daed 服务使配置生效
          
          ---
          
          ## 常见问题
          
          ### Q1: 安装后 LuCI 界面没有 Daed 菜单？
          **A**: 这是 LuCI 缓存问题，请：
          1. 退出 LuCI 登录
          2. 清除浏览器缓存
          3. 重新登录即可
          
          ### Q2: 代理不生效？
          **A**: 检查以下几点：
          1. 确认 Daed 服务已启动
          2. 检查防火墙规则是否正确
          3. 查看日志：`logread | grep daed`
          
          ### Q3: 如何卸载 Daed？
          **A**: 
          ```bash
          apk del luci-app-daed
          apk del daed
          ```
          
          ---
          
          ## 注意事项
          
          - **订阅安全**：仅使用可信的订阅链接
          - **资源占用**：代理工具会占用一定系统资源
          
          ENDOFFILE

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daed-25.12-${{ env.LATEST_TAG }}
          name: "Daed 25.12 ${{ env.LATEST_TAG }}"
          body_path: release_notes.md
          files: makeself/daed_25.12_*.run
