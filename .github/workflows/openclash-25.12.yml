name: Build OpenClash .run (25.12)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest release tag
        id: fetch_latest_tag
        run: |
          latest_tag=$(curl -sk https://api.github.com/repos/vernesong/OpenClash/releases | grep "tag_name" | head -n 1 | awk -F ":" '{print $2}' | sed 's/\"//g;s/,//;s/ //')
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download OpenClash
        run: |
          curl -sk "https://api.github.com/repos/vernesong/OpenClash/releases" > releases.txt
          mkdir -p openclash_x86_64 openclash_aarch64_cortex-a53
          for ext in apk ipk; do
            url=$(grep "browser_download_url" releases.txt | grep "luci-app-openclash.*\.${ext}" | head -1 | awk -F '"' '{print $4}')
            if [ -n "$url" ]; then
              curl -sL -o "openclash.${ext}" "$url"
              cp "openclash.${ext}" openclash_x86_64/
              cp "openclash.${ext}" openclash_aarch64_cortex-a53/
            fi
          done
          rm -f releases.txt

      - name: Create install.sh
        run: |
          cat << 'EOF' > install.sh
          #!/bin/sh
          echo "=== OpenClash 安装开始 ==="
          
          PKG=""
          [ -f "luci-app-openclash.apk" ] && PKG="luci-app-openclash.apk"
          [ -f "luci-app-openclash.ipk" ] && PKG="luci-app-openclash.ipk"
          
          if [ -z "$PKG" ]; then
            echo "错误: 未找到安装包"
            exit 1
          fi

          if command -v apk >/dev/null 2>&1; then
            echo "检测到 ImmortalWrt/系统 (apk)，正在安装..."
            apk add --allow-untrusted "$PKG"
          elif command -v opkg >/dev/null 2>&1; then
            echo "检测到 OpenWrt (opkg)，正在安装..."
            opkg update
            opkg install "$PKG" --force-depends
          else
            echo "错误: 未找到包管理器"
            exit 1
          fi

          echo "清理 LuCI 缓存..."
          rm -rf /tmp/luci-indexcache /tmp/luci-modulecache
          
          if [ -f /etc/init.d/rpcd ]; then /etc/init.d/rpcd restart; fi
          echo "=== 安装完成，请刷新页面 ==="
          EOF
          chmod +x install.sh
          cp install.sh openclash_x86_64/
          cp install.sh openclash_aarch64_cortex-a53/

      - name: Create self-extracting packages
        run: |
          cd makeself
          ./makeself.sh ../openclash_x86_64/ openclash_25.12_${{ env.LATEST_TAG }}_x86_64.run "OpenClash" ./install.sh
          ./makeself.sh ../openclash_aarch64_cortex-a53/ openclash_25.12_${{ env.LATEST_TAG }}_aarch64.run "OpenClash" ./install.sh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v-openclash-25.12-${{ env.LATEST_TAG }}
          files: makeself/*.run
          overwrite: true