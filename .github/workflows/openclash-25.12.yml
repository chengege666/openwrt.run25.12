name: Build OpenClash .run (25.12)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest release tag
        id: fetch_latest_tag
        run: |
          latest_tag=$(curl -sk https://api.github.com/repos/vernesong/OpenClash/releases | grep "tag_name" | head -n 1 | awk -F ":" '{print $2}' | sed 's/\"//g;s/,//;s/ //')
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download OpenClash APK and dependencies
        run: |
          echo "Downloading OpenClash APK and dependencies for ${{ env.LATEST_TAG }}..."
          curl -sk "https://api.github.com/repos/vernesong/OpenClash/releases" > releases.txt

          mkdir -p openclash_x86_64/depends openclash_aarch64_cortex-a53/depends

          # 获取最新 release 的下载链接
          apk_url=$(grep "browser_download_url" releases.txt | grep -E "openclash.*\.apk" | head -1 | awk -F '"' '{print $4}')

          if [ -z "$apk_url" ]; then
            echo "错误：未找到 OpenClash APK 下载链接"
            cat releases.txt | head -50
            exit 1
          fi

          echo "下载 APK: $apk_url"
          curl --connect-timeout 30 -m 600 -kLo "openclash.apk" "$apk_url"

          if [ ! -f "openclash.apk" ] || [ ! -s "openclash.apk" ]; then
            echo "错误：APK 下载失败或文件为空"
            exit 1
          fi

          # 下载依赖包
          BASE_URL="https://dl.openwrt.ai/packages-25.12"
          PLATFORMS="x86_64 aarch64_cortex-a53"

          DEPENDS=("bash" "dnsmasq-full" "curl" "ca-bundle" "ip-full" "ruby" "ruby-yaml" "unzip" "luci-compat" "luci" "luci-base" "luci-mod-status" "luci-mod-network" "luci-mod-system")
          KERNEL_DEPENDS=("kmod-tun" "kmod-inet-diag" "kmod-nft-tproxy")

          for platform in $PLATFORMS; do
            feed_url="${BASE_URL}/${platform}/packages"
            kernel_url="${BASE_URL}/${platform}/kmods/$(uname -r 2>/dev/null || echo '5.15.*')"
            echo "准备平台: $platform"

            # 下载普通依赖
            for dep in "${DEPENDS[@]}"; do
              index_html="$(wget -qO- --timeout=15 "${feed_url}/" 2>/dev/null || echo "")"
              dep_file="$(echo "$index_html" | grep -oE "${dep}_[^\"< ]*\\.apk" | sort -V | tail -n 1)"
              if [ -n "$dep_file" ]; then
                echo "下载: ${feed_url}/${dep_file}"
                curl -L --fail --connect-timeout 15 --max-time 60 "${feed_url}/${dep_file}" -o "openclash_${platform}/depends/${dep_file}" -# 2>/dev/null || echo "跳过: $dep_file"
              fi
            done

            # 下载内核模块依赖
            for dep in "${KERNEL_DEPENDS[@]}"; do
              index_html="$(wget -qO- --timeout=15 "${kernel_url}/" 2>/dev/null || echo "")"
              dep_file="$(echo "$index_html" | grep -oE "${dep}_[^\"< ]*\\.apk" | sort -V | tail -n 1)"
              if [ -n "$dep_file" ]; then
                echo "下载: ${kernel_url}/${dep_file}"
                curl -L --fail --connect-timeout 15 --max-time 60 "${kernel_url}/${dep_file}" -o "openclash_${platform}/depends/${dep_file}" -# 2>/dev/null || echo "跳过: $dep_file"
              fi
            done

            # 复制主程序
            cp openclash.apk "openclash_${platform}/"

            echo "=== $platform ==="
            ls -la "openclash_${platform}/"
            ls -la "openclash_${platform}/depends/" | head -20
          done

      - name: Create install.sh
        run: |
          cat << 'EOF' > openclash_x86_64/install.sh
          #!/bin/sh
          set -e
          echo "===> 正在更新软件源..."
          apk update
          echo "===> 正在安装 OpenClash 依赖包..."
          if [ -d "depends" ] && [ "$(ls depends/*.apk 2>/dev/null)" ]; then
            apk add -q --force-overwrite --clean-protected --allow-untrusted depends/*.apk
          fi
          echo "===> 正在安装 OpenClash 主程序..."
          apk add -q --force-overwrite --clean-protected --allow-untrusted openclash.apk
          echo "===> 清除 LuCI 缓存..."
          rm -rf /tmp/luci-modulecache/* /tmp/luci-indexcache 2>/dev/null || true
          echo "===> 安装完成！"
          echo "请退出并重新登录 LuCI，然后在服务菜单中配置 OpenClash"
          EOF
          chmod +x openclash_x86_64/install.sh
          cp openclash_x86_64/install.sh openclash_aarch64_cortex-a53/install.sh

      - name: Create self-extracting packages
        run: |
          mv openclash_x86_64 makeself/
          mv openclash_aarch64_cortex-a53 makeself/
          cd makeself
          ./makeself.sh openclash_x86_64/ openclash_25.12_${{ env.LATEST_TAG }}_x86_64.run "OpenClash Installer (25.12)" ./install.sh
          ./makeself.sh openclash_aarch64_cortex-a53/ openclash_25.12_${{ env.LATEST_TAG }}_aarch64.run "OpenClash Installer (25.12)" ./install.sh

      - name: Create release notes
        run: |
          cat > release_notes.md << 'ENDOFFILE'
          ## OpenClash .run (25.12)
          
          一款功能强大的 OpenWrt 代理插件，支持多种代理协议和智能分流。
          
          ---
          
          ## 系统要求
          
          - **固件版本**：OpenWrt 或 ImmortalWrt `25.12+`
          - **支持架构**：`x86_64`、`aarch64_cortex-a53`
          - **磁盘空间**：至少 50MB 可用空间
          - **权限要求**：root 权限
          
          ---
          
          ## 功能特性
          
          - **多协议支持**：支持 Shadowsocks、V2Ray、Trojan、Hysteria 等协议
          - **智能分流**：支持规则分流和全局模式
          - **订阅管理**：支持订阅链接自动更新节点
          - **Web 管理**：提供友好的 LuCI 管理界面
          - **核心集成**：内置 Clash Meta 核心
          
          ---
          
          ## 安装步骤
          
          ### 通过 SSH 安装
          
          **1. 上传安装包**
          
          方式 A - 使用 SCP（推荐）：
          ```bash
          # x86_64 设备
          scp openclash_25.12_*_x86_64.run root@192.168.1.1:/tmp/
          
          # aarch64 设备
          scp openclash_25.12_*_aarch64.run root@192.168.1.1:/tmp/
          ```
          
          方式 B - 使用 WinSCP/FileZilla：
          - 连接路由器（协议：SCP，端口：22）
          - 将对应的 `.run` 文件上传到 `/tmp/` 目录
          
          **注意**：不要使用 LuCI 的"上传软件包"功能，`.run` 文件不是 APK 包！
          
          **2. 进入临时目录**
          ```bash
          cd /tmp
          ```
          
          **3. 添加执行权限**
          ```bash
          # x86_64 设备
          chmod +x openclash_25.12_*_x86_64.run
          
          # aarch64 设备
          chmod +x openclash_25.12_*_aarch64.run
          ```
          
          **4. 执行安装**
          ```bash
          # x86_64 设备
          ./openclash_25.12_*_x86_64.run
          
          # aarch64 设备
          ./openclash_25.12_*_aarch64.run
          ```
          
          **5. 等待安装完成**
          - 安装过程会自动安装依赖并安装插件
          - 看到安装成功提示后继续下一步
          
          **6. 刷新 LuCI 界面**
          - 退出并重新登录 LuCI
          - 在 **服务** 菜单下找到 **OpenClash** 入口
          
          ---
          
          ## 验证安装
          
          **检查是否安装成功**：
          ```bash
          apk info | grep openclash
          ```
          
          **访问界面**：
          - 在 LuCI 菜单中找到 **服务 -> OpenClash** 入口
          
          ---
          
          ## 使用方法
          
          **1. 打开 OpenClash 设置界面**
          - 登录 LuCI 管理界面
          - 找到 **服务 -> OpenClash** 菜单项
          
          **2. 基本配置**
          - **运行模式**：选择代理模式（规则/全局/直连）
          - **监听端口**：设置代理监听端口
          - **DNS 设置**：配置 DNS 解析方式
          
          **3. 订阅管理**
          - 添加订阅链接
          - 更新节点列表
          - 选择可用节点
          
          **4. 保存并应用**
          - 点击 **保存并应用**
          - 重启 OpenClash 服务使配置生效
          
          ---
          
          ## 常见问题
          
          ### Q1: 安装后 LuCI 界面没有 OpenClash 菜单？
          **A**: 这是 LuCI 缓存问题，请：
          1. 退出 LuCI 登录
          2. 清除浏览器缓存
          3. 重新登录即可
          
          ### Q2: 代理不生效？
          **A**: 检查以下几点：
          1. 确认 OpenClash 服务已启动
          2. 检查防火墙规则是否正确
          3. 查看日志：`logread | grep openclash`
          
          ### Q3: 如何卸载 OpenClash？
          **A**: 
          ```bash
          apk del luci-app-openclash
          rm -rf /etc/openclash
          ```
          
          ---
          
          ## 注意事项
          
          - **核心更新**：定期更新 Clash Meta 核心以获得最新功能
          - **订阅安全**：仅使用可信的订阅链接
          - **资源占用**：代理工具会占用一定系统资源
          
          ENDOFFILE

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v-openclash-25.12-${{ env.LATEST_TAG }}
          name: "OpenClash 25.12 ${{ env.LATEST_TAG }}"
          body_path: release_notes.md
          files: makeself/openclash_25.12_*.run
          draft: false
          prerelease: false
          overwrite: true
