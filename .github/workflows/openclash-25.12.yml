name: Build OpenClash .run (Latest)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone makeself
        run: git clone https://github.com/megastep/makeself.git

      - name: Download OpenClash APK
        run: |
          mkdir -p openclash_pkg
          # 获取最新版本下载链接
          url=$(curl -sk https://api.github.com/repos/vernesong/OpenClash/releases/latest | grep "browser_download_url" | grep "luci-app-openclash.*\.apk" | head -1 | cut -d '"' -f 4)
          curl -L "$url" -o openclash_pkg/luci-app-openclash.apk
          echo "DOWNLOADED_FILE=luci-app-openclash.apk" >> $GITHUB_ENV

      - name: Create install.sh
        run: |
          cat << 'EOF' > openclash_pkg/install.sh
          #!/bin/sh
          echo "=== 正在准备安装 OpenClash 及其依赖 ==="
          
          # 定义依赖列表
          DEPENDS="luci luci-base dnsmasq-full bash curl ca-bundle ipset ip-full ruby ruby-yaml unzip iptables kmod-ipt-nat iptables-mod-tproxy iptables-mod-extra kmod-tun luci-compat ip6tables-mod-nat kmod-inet-diag kmod-nft-tproxy"

          install_deps() {
            if command -v apk >/dev/null 2>&1; then
              echo "使用 APK 安装依赖..."
              apk update
              apk add --no-cache $DEPENDS
            elif command -v opkg >/dev/null 2>&1; then
              echo "使用 OPKG 安装依赖..."
              opkg update
              opkg install $DEPENDS --force-depends
            fi
          }

          install_deps

          echo "正在安装 OpenClash..."
          if command -v apk >/dev/null 2>&1; then
            apk add --allow-untrusted ./luci-app-openclash.apk
          else
            opkg install ./luci-app-openclash.apk --force-depends
          fi

          echo "清理缓存..."
          rm -rf /tmp/luci-indexcache /tmp/luci-modulecache
          if [ -f /etc/init.d/rpcd ]; then /etc/init.d/rpcd restart; fi
          
          echo "=== 安装完成！请强制刷新浏览器页面 (Ctrl+F5) ==="
          EOF
          chmod +x openclash_pkg/install.sh

      - name: Create .run package
        run: |
          cd makeself
          ./makeself.sh ../openclash_pkg/ openclash_latest.run "OpenClash Installer" ./install.sh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: openclash-installer-${{ github.run_number }}
          files: makeself/openclash_latest.run
          overwrite: true