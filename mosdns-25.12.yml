name: Build MosDNS .run (25.12)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Fetch latest release tag
        id: fetch_latest_tag
        run: |
          latest_tag=$(curl -sk https://api.github.com/repos/sbwml/luci-app-mosdns/releases | grep "tag_name" | head -n 1 | awk -F ":" '{print $2}' | sed 's/\"//g;s/,//;s/ //')
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV
       
      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download latest mosdns packages
        run: |
          echo "Downloading MosDNS packages for $LATEST_TAG..."
          curl -sk --connect-timeout 10 "https://api.github.com/repos/sbwml/luci-app-mosdns/releases" > releases.txt

          mkdir -p mosdns_x86_64 mosdns_aarch64_cortex-a53

          # 下载 25.12 版本的 tar.gz 包
          tar_x86_64=$(grep "browser_download_url" releases.txt | grep "x86_64-openwrt-25.12.tar.gz" | head -1 | awk -F '"' '{print $4}')
          tar_aarch64=$(grep "browser_download_url" releases.txt | grep "aarch64_cortex-a53-openwrt-25.12.tar.gz" | head -1 | awk -F '"' '{print $4}')

          echo "下载 x86_64 包: $tar_x86_64"
          echo "下载 aarch64 包: $tar_aarch64"

          curl --connect-timeout 30 -m 600 -kLo "mosdns_x86_64.tar.gz" "$tar_x86_64"
          curl --connect-timeout 30 -m 600 -kLo "mosdns_aarch64.tar.gz" "$tar_aarch64"

          echo "解压 x86_64 包..."
          tar -xzf mosdns_x86_64.tar.gz -C mosdns_x86_64/
          rm mosdns_x86_64.tar.gz
          find mosdns_x86_64/ -name "*.apk" -exec mv {} mosdns_x86_64/ \;
          find mosdns_x86_64/ -type d ! -path "mosdns_x86_64/" -exec rm -rf {} + 2>/dev/null || true

          echo "解压 aarch64 包..."
          tar -xzf mosdns_aarch64.tar.gz -C mosdns_aarch64_cortex-a53/
          rm mosdns_aarch64.tar.gz
          find mosdns_aarch64_cortex-a53/ -name "*.apk" -exec mv {} mosdns_aarch64_cortex-a53/ \;
          find mosdns_aarch64_cortex-a53/ -type d ! -path "mosdns_aarch64_cortex-a53/" -exec rm -rf {} + 2>/dev/null || true

          echo ""
          echo "=== 检查提取文件 ==="
          echo "x86_64 目录:"
          ls -la mosdns_x86_64/
          echo ""
          echo "aarch64 目录:"
          ls -la mosdns_aarch64_cortex-a53/
   
      - name: Create install.sh
        run: |
          cat << 'EOF' > mosdns_x86_64/install.sh
          #!/bin/sh
          echo "=== MosDNS 安装开始 ==="
          echo "当前目录: $(pwd)"
          echo "目录内容:"
          ls -la *.apk 2>/dev/null || echo "未找到 .apk 文件"
          echo ""
          apk update
          echo ""
          echo "开始安装 APK 包..."
          for f in mosdns*.apk v2dat*.apk v2ray-geoip*.apk v2ray-geosite*.apk luci-app-mosdns*.apk luci-i18n-mosdns*.apk; do
            if [ -f "$f" ]; then
              echo "安装: $f"
              apk add --allow-untrusted "$f" || echo "安装失败: $f"
            else
              echo "跳过: $f (文件不存在)"
            fi
          done
          echo ""
          echo "=== 安装完成 ==="
          echo "已安装的包:"
          apk info | grep mosdns
          EOF
          chmod +x mosdns_x86_64/install.sh
          cp mosdns_x86_64/install.sh mosdns_aarch64_cortex-a53/install.sh

      - name: Create self-extracting packages
        run: |
          mv mosdns_x86_64 makeself/
          mv mosdns_aarch64_cortex-a53 makeself/
          cd makeself
          ./makeself.sh mosdns_x86_64/ mosdns_25.12_${{ env.LATEST_TAG }}_x86_64.run "MosDNS Installer (25.12)" ./install.sh
          ./makeself.sh mosdns_aarch64_cortex-a53/ mosdns_25.12_${{ env.LATEST_TAG }}_aarch64.run "MosDNS Installer (25.12)" ./install.sh

      - name: Create release notes
        run: |
          cat > release_notes.md << 'ENDOFFILE'
          ## MosDNS .run (25.12)
          
          一款功能强大的 DNS 服务器和代理工具，支持多种协议和智能分流。
          
          ---
          
          ## 系统要求
          
          - **固件版本**：OpenWrt 或 ImmortalWrt `25.12+`
          - **支持架构**：`x86_64`、`aarch64_cortex-a53`
          - **磁盘空间**：至少 20MB 可用空间
          - **权限要求**：root 权限
          
          ---
          
          ## 功能特性
          
          - **DNS 加速**：多线程并发查询，提升 DNS 解析速度
          - **智能分流**：支持国内外 DNS 分流，优化访问体验
          - **去广告**：内置广告过滤功能
          - **多协议**：支持 DoH/DoT/DoQ 等加密 DNS 协议
          - **LuCI 界面**：提供友好的 Web 管理界面
          
          ---
          
          ## 安装步骤
          
          ### 通过 SSH 安装
          
          **1. 上传安装包**
          
          方式 A - 使用 SCP（推荐）：
          ```bash
          # x86_64 设备
          scp mosdns_25.12_*_x86_64.run root@192.168.1.1:/tmp/
          
          # aarch64 设备
          scp mosdns_25.12_*_aarch64.run root@192.168.1.1:/tmp/
          ```
          
          方式 B - 使用 WinSCP/FileZilla：
          - 连接路由器（协议：SCP，端口：22）
          - 将对应的 `.run` 文件上传到 `/tmp/` 目录
          
          **注意**：不要使用 LuCI 的"上传软件包"功能，`.run` 文件不是 APK 包！
          
          **2. 进入临时目录**
          ```bash
          cd /tmp
          ```
          
          **3. 添加执行权限**
          ```bash
          # x86_64 设备
          chmod +x mosdns_25.12_*_x86_64.run
          
          # aarch64 设备
          chmod +x mosdns_25.12_*_aarch64.run
          ```
          
          **4. 执行安装**
          ```bash
          # x86_64 设备
          ./mosdns_25.12_*_x86_64.run
          
          # aarch64 设备
          ./mosdns_25.12_*_aarch64.run
          ```
          
          **5. 等待安装完成**
          - 安装过程会自动解压并安装插件
          - 看到安装成功提示后继续下一步
          
          **6. 刷新 LuCI 界面**
          - 退出并重新登录 LuCI
          - 在 **服务** 菜单下找到 **MosDNS** 入口
          
          ---
          
          ## 验证安装
          
          **检查是否安装成功**：
          ```bash
          apk list --installed | grep mosdns
          ```
          
          **查看服务状态**：
          ```bash
          /etc/init.d/mosdns status
          ```
          
          **访问界面**：
          - 在 LuCI 菜单中找到 **服务 -> MosDNS** 入口
          
          ---
          
          ## 使用方法
          
          **1. 打开 MosDNS 设置界面**
          - 登录 LuCI 管理界面
          - 找到 **服务 -> MosDNS** 菜单项
          
          **2. 基本配置**
          - **监听端口**：默认 53，可自定义
          - **上游服务器**：添加 DNS 上游服务器地址
          - **分流规则**：配置国内外 DNS 分流
          
          **3. 高级配置**
          - **缓存设置**：调整 DNS 缓存大小
          - **去广告**：启用广告过滤功能
          - **加密 DNS**：配置 DoH/DoT/DoQ 协议
          
          **4. 保存并应用**
          - 点击 **保存并应用**
          - 重启 MosDNS 服务使配置生效
          
          ---
          
          ## 常见问题
          
          ### Q1: 安装后 LuCI 界面没有 MosDNS 菜单？
          **A**: 这是 LuCI 缓存问题，请：
          1. 退出 LuCI 登录
          2. 清除浏览器缓存
          3. 重新登录即可
          
          ### Q2: 如何确认我的设备架构？
          **A**: 通过 SSH 执行以下命令：
          ```bash
          uname -m
          ```
          - 输出 `x86_64` 选择 x86_64 版本
          - 输出 `aarch64` 选择 aarch64 版本
          
          ### Q3: DNS 解析不生效？
          **A**: 检查以下几点：
          1. 确认 MosDNS 服务已启动
          2. 检查防火墙是否放行 53 端口
          3. 查看日志：`logread | grep mosdns`
          
          ### Q4: 如何卸载 MosDNS？
          **A**: 
          ```bash
          apk del luci-app-mosdns
          apk del mosdns
          ```
          
          ---
          
          ## 注意事项
          
          - **端口冲突**：确保 53 端口未被其他 DNS 服务占用
          - **上游服务器**：建议配置多个上游服务器提高稳定性
          - **缓存大小**：根据设备内存调整缓存大小
          
          ENDOFFILE

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mosdns-25.12-${{ env.LATEST_TAG }}
          name: "MosDNS 25.12 ${{ env.LATEST_TAG }}"
          body_path: release_notes.md
          files: makeself/mosdns_25.12_*.run
