name: Build Nikki .run (25.12)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest release tag
        id: fetch_latest_tag
        run: |
          latest_tag=$(curl -sk https://api.github.com/repos/nikkinikki-org/OpenWrt-nikki/releases/latest | jq -r '.tag_name')
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download Nikki packages
        run: |
          echo "Downloading Nikki packages for ${{ env.LATEST_TAG }}..."
          curl -sk "https://api.github.com/repos/nikkinikki-org/OpenWrt-nikki/releases/latest" > releases.txt

          mkdir -p nikki_x86_64 nikki_aarch64_cortex-a53

          # 下载 x86_64 的 25.12 版本
          nikki_x86_64=$(grep "browser_download_url" releases.txt | grep "nikki_x86_64-openwrt-25.12.*\.tar\.gz" | head -1 | awk -F '"' '{print $4}')
          echo "下载 x86_64: $nikki_x86_64"
          curl --connect-timeout 30 -m 600 -kLo "nikki_x86_64.tar.gz" "$nikki_x86_64"
          tar -xzf nikki_x86_64.tar.gz -C nikki_x86_64/

          # 下载 aarch64_cortex-a53 的 25.12 版本
          nikki_aarch64=$(grep "browser_download_url" releases.txt | grep "nikki_aarch64_cortex-a53-openwrt-25.12.*\.tar\.gz" | head -1 | awk -F '"' '{print $4}')
          echo "下载 aarch64_cortex-a53: $nikki_aarch64"
          curl --connect-timeout 30 -m 600 -kLo "nikki_aarch64.tar.gz" "$nikki_aarch64"
          tar -xzf nikki_aarch64.tar.gz -C nikki_aarch64_cortex-a53/

          echo ""
          echo "=== 检查文件 ==="
          ls -la nikki_x86_64/
          ls -la nikki_aarch64_cortex-a53/

      - name: Create install.sh
        run: |
          cat << 'EOF' > nikki_x86_64/install.sh
          #!/bin/sh
          set -e
          echo "===> 正在更新软件源..."
          apk update
          echo "===> 正在安装 Nikki 依赖..."
          apk add -q --force-overwrite --clean-protected --allow-untrusted *.apk
          echo "===> 安装完成！"
          echo "请在 LuCI 服务菜单中配置 Nikki"
          EOF
          chmod +x nikki_x86_64/install.sh
          cp nikki_x86_64/install.sh nikki_aarch64_cortex-a53/install.sh

      - name: Create self-extracting packages
        run: |
          mv nikki_x86_64 makeself/
          mv nikki_aarch64_cortex-a53 makeself/
          cd makeself
          ./makeself.sh nikki_x86_64/ nikki_25.12_${{ env.LATEST_TAG }}_x86_64.run "Nikki Installer (25.12)" ./install.sh
          ./makeself.sh nikki_aarch64_cortex-a53/ nikki_25.12_${{ env.LATEST_TAG }}_aarch64.run "Nikki Installer (25.12)" ./install.sh

      - name: Create release notes
        run: |
          cat > release_notes.md << 'ENDOFFILE'
          ## Nikki .run (25.12)
          
          基于 Mihomo 的 OpenWrt 透明代理工具，提供强大的代理和分流功能。
          
          ---
          
          ## 系统要求
          
          - **固件版本**：OpenWrt 或 ImmortalWrt `25.12+`
          - **支持架构**：`x86_64`、`aarch64_cortex-a53`
          - **磁盘空间**：至少 50MB 可用空间
          - **权限要求**：root 权限
          - **内核要求**：Linux Kernel >= 5.13
          - **防火墙**：firewall4
          
          ---
          
          ## 功能特性
          
          - **透明代理**：支持 Redirect/TPROXY/TUN 模式
          - **IPv4/IPv6**：支持双栈代理
          - **访问控制**：支持精细化的访问控制
          - **配置文件混入**：支持自定义配置混入
          - **配置文件编辑器**：内置配置文件编辑器
          - **定时重启**：支持定时重启服务
          - **Mihomo 核心**：基于 Mihomo 核心，性能优异
          
          ---
          
          ## 安装步骤
          
          ### 通过 SSH 安装
          
          **1. 上传安装包**
          
          方式 A - 使用 SCP（推荐）：
          ```bash
          # x86_64 设备
          scp nikki_25.12_*_x86_64.run root@192.168.1.1:/tmp/
          
          # aarch64 设备
          scp nikki_25.12_*_aarch64.run root@192.168.1.1:/tmp/
          ```
          
          方式 B - 使用 WinSCP/FileZilla：
          - 连接路由器（协议：SCP，端口：22）
          - 将对应的 `.run` 文件上传到 `/tmp/` 目录
          
          **注意**：不要使用 LuCI 的"上传软件包"功能，`.run` 文件不是 APK 包！
          
          **2. 进入临时目录**
          ```bash
          cd /tmp
          ```
          
          **3. 添加执行权限**
          ```bash
          # x86_64 设备
          chmod +x nikki_25.12_*_x86_64.run
          
          # aarch64 设备
          chmod +x nikki_25.12_*_aarch64.run
          ```
          
          **4. 执行安装**
          ```bash
          # x86_64 设备
          ./nikki_25.12_*_x86_64.run
          
          # aarch64 设备
          ./nikki_25.12_*_aarch64.run
          ```
          
          **5. 等待安装完成**
          - 安装过程会自动安装所有依赖
          - 看到安装成功提示后继续下一步
          
          **6. 刷新 LuCI 界面**
          - 退出并重新登录 LuCI
          - 在 **服务** 菜单中找到 Nikki 进行配置
          
          ---
          
          ## 验证安装
          
          **检查是否安装成功**：
          ```bash
          apk info | grep nikki
          ```
          
          **查看服务状态**：
          ```bash
          /etc/init.d/nikki status
          ```
          
          ---
          
          ## 常见问题
          
          ### Q1: 安装后 LuCI 中没有 Nikki 菜单？
          **A**: 请刷新浏览器缓存或重新登录 LuCI。
          
          ### Q2: 如何卸载 Nikki？
          **A**: 
          ```bash
          apk del luci-app-nikki luci-i18n-nikki-zh-cn nikki
          ```
          
          ### Q3: 如何更新 Nikki？
          **A**: 下载最新版本的 `.run` 文件，重新执行安装即可。
          
          ---
          
          ## 注意事项
          
          - **依赖问题**：如提示缺少依赖，请先安装依赖包
          - **配置备份**：卸载前请备份配置文件
          - **网络设置**：安装后请根据实际需求配置代理规则
          - **内核要求**：需要 Linux Kernel >= 5.13
          - **防火墙要求**：需要 firewall4
          
          ENDOFFILE

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nikki-25.12-${{ env.LATEST_TAG }}
          name: "Nikki 25.12 ${{ env.LATEST_TAG }}"
          body_path: release_notes.md
          files: makeself/nikki_25.12_*.run
