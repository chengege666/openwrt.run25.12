name: Build PassWall2 .run (25.12)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest release tag
        id: fetch_latest_tag
        run: |
          latest_tag=$(curl -sk https://api.github.com/repos/Openwrt-Passwall/openwrt-passwall2/releases/latest | jq -r '.tag_name')
          echo "LATEST_TAG=$latest_tag" >> $GITHUB_ENV

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download PassWall2 APK packages
        run: |
          echo "Downloading PassWall2 APK packages for ${{ env.LATEST_TAG }}..."
          curl -sk "https://api.github.com/repos/Openwrt-Passwall/openwrt-passwall2/releases/latest" > releases.txt

          mkdir -p passwall2_x86_64 passwall2_aarch64_cortex-a53

          # 下载 luci-app-passwall2 APK
          luci_app=$(grep "browser_download_url" releases.txt | grep "luci-app-passwall2.*\.apk" | head -1 | awk -F '"' '{print $4}')
          echo "下载 luci-app-passwall2: $luci_app"
          curl --connect-timeout 30 -m 600 -kLo "luci-app-passwall2.apk" "$luci_app"

          # 下载 luci-i18n-passwall2-zh-cn APK
          luci_i18n=$(grep "browser_download_url" releases.txt | grep "luci-i18n-passwall2-zh-cn.*\.apk" | head -1 | awk -F '"' '{print $4}')
          echo "下载 luci-i18n-passwall2-zh-cn: $luci_i18n"
          curl --connect-timeout 30 -m 600 -kLo "luci-i18n-passwall2-zh-cn.apk" "$luci_i18n"

          # 复制到对应架构目录
          cp luci-app-passwall2.apk passwall2_x86_64/
          cp luci-i18n-passwall2-zh-cn.apk passwall2_x86_64/

          cp luci-app-passwall2.apk passwall2_aarch64_cortex-a53/
          cp luci-i18n-passwall2-zh-cn.apk passwall2_aarch64_cortex-a53/

          echo ""
          echo "=== 检查文件 ==="
          ls -la passwall2_x86_64/
          ls -la passwall2_aarch64_cortex-a53/

      - name: Create install.sh
        run: |
          cat << 'EOF' > passwall2_x86_64/install.sh
          #!/bin/sh
          set -e
          echo "===> 正在更新软件源..."
          apk update
          echo "===> 正在安装 PassWall2 主程序..."
          apk add -q --force-overwrite --clean-protected --allow-untrusted luci-app-passwall2.apk
          echo "===> 正在安装中文语言包..."
          apk add -q --force-overwrite --clean-protected --allow-untrusted luci-i18n-passwall2-zh-cn.apk
          echo "===> 安装完成！"
          echo "请在 LuCI 服务菜单中配置 PassWall2"
          EOF
          chmod +x passwall2_x86_64/install.sh
          cp passwall2_x86_64/install.sh passwall2_aarch64_cortex-a53/install.sh

      - name: Create self-extracting packages
        run: |
          mv passwall2_x86_64 makeself/
          mv passwall2_aarch64_cortex-a53 makeself/
          cd makeself
          ./makeself.sh passwall2_x86_64/ passwall2_25.12_${{ env.LATEST_TAG }}_x86_64.run "PassWall2 Installer (25.12)" ./install.sh
          ./makeself.sh passwall2_aarch64_cortex-a53/ passwall2_25.12_${{ env.LATEST_TAG }}_aarch64.run "PassWall2 Installer (25.12)" ./install.sh

      - name: Create release notes
        run: |
          cat > release_notes.md << 'ENDOFFILE'
          ## PassWall2 .run (25.12)
          
          PassWall 的升级版本，提供更强大的代理功能和更好的用户体验。
          
          ---
          
          ## 系统要求
          
          - **固件版本**：OpenWrt 或 ImmortalWrt `25.12+`
          - **支持架构**：`x86_64`、`aarch64_cortex-a53`
          - **磁盘空间**：至少 50MB 可用空间
          - **权限要求**：root 权限
          
          ---
          
          ## 功能特性
          
          - **增强协议支持**：支持更多代理协议和传输方式
          - **智能路由**：更智能的流量分流和路由策略
          - **节点管理**：支持节点订阅、测速、自动切换
          - **DNS 优化**：内置 DNS 优化和防污染功能
          - **Web 界面**：提供友好的 LuCI 配置界面
          - **性能优化**：相比 PassWall 有更好的性能和稳定性
          
          ---
          
          ## 安装步骤
          
          ### 通过 SSH 安装
          
          **1. 上传安装包**
          
          方式 A - 使用 SCP（推荐）：
          ```bash
          # x86_64 设备
          scp passwall2_25.12_*_x86_64.run root@192.168.1.1:/tmp/
          
          # aarch64 设备
          scp passwall2_25.12_*_aarch64.run root@192.168.1.1:/tmp/
          ```
          
          方式 B - 使用 WinSCP/FileZilla：
          - 连接路由器（协议：SCP，端口：22）
          - 将对应的 `.run` 文件上传到 `/tmp/` 目录
          
          **注意**：不要使用 LuCI 的"上传软件包"功能，`.run` 文件不是 APK 包！
          
          **2. 进入临时目录**
          ```bash
          cd /tmp
          ```
          
          **3. 添加执行权限**
          ```bash
          # x86_64 设备
          chmod +x passwall2_25.12_*_x86_64.run
          
          # aarch64 设备
          chmod +x passwall2_25.12_*_aarch64.run
          ```
          
          **4. 执行安装**
          ```bash
          # x86_64 设备
          ./passwall2_25.12_*_x86_64.run
          
          # aarch64 设备
          ./passwall2_25.12_*_aarch64.run
          ```
          
          **5. 等待安装完成**
          - 安装过程会自动安装依赖并安装主程序
          - 看到安装成功提示后继续下一步
          
          **6. 刷新 LuCI 界面**
          - 退出并重新登录 LuCI
          - 在 **服务** 菜单中找到 PassWall2 进行配置
          
          ---
          
          ## 验证安装
          
          **检查是否安装成功**：
          ```bash
          apk info | grep passwall2
          ```
          
          **查看服务状态**：
          ```bash
          /etc/init.d/passwall2 status
          ```
          
          ---
          
          ## 常见问题
          
          ### Q1: 安装后 LuCI 中没有 PassWall2 菜单？
          **A**: 请刷新浏览器缓存或重新登录 LuCI。
          
          ### Q2: 如何卸载 PassWall2？
          **A**: 
          ```bash
          apk del luci-app-passwall2 luci-i18n-passwall2-zh-cn
          ```
          
          ### Q3: 如何更新 PassWall2？
          **A**: 下载最新版本的 `.run` 文件，重新执行安装即可。
          
          ### Q4: PassWall 和 PassWall2 可以同时安装吗？
          **A**: 不建议同时安装，可能会产生冲突。请选择其中一个使用。
          
          ---
          
          ## 注意事项
          
          - **依赖问题**：如提示缺少依赖，请先安装依赖包
          - **配置备份**：卸载前请备份配置文件
          - **网络设置**：安装后请根据实际需求配置代理规则
          - **版本选择**：PassWall2 是 PassWall 的升级版，功能更强大
          
          ENDOFFILE

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: passwall2-25.12-${{ env.LATEST_TAG }}
          name: "PassWall2 25.12 ${{ env.LATEST_TAG }}"
          body_path: release_notes.md
          files: makeself/passwall2_25.12_*.run
