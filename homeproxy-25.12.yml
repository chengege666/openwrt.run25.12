name: Build HomeProxy .run (25.12)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone makeself repository
        run: git clone https://github.com/megastep/makeself.git

      - name: Download HomeProxy packages
        run: |
          BASE_URL="https://dl.openwrt.ai/packages-25.12"
          PLATFORMS="x86_64 aarch64_cortex-a53"

          mkdir -p makeself

          for platform in $PLATFORMS; do
            feed_url="${BASE_URL}/${platform}/kiddin9"
            echo "Preparing platform: $platform"
            mkdir -p "makeself/homeproxy_${platform}"

            index_html="$(wget -qO- --timeout=15 "${feed_url}/")"

            homeproxy_file="$(echo "$index_html" | grep -oE 'luci-app-homeproxy_[^"< ]*_all\.ipk' | sort -V | tail -n 1)"
            singbox_file="$(echo "$index_html" | grep -oE "sing-box_[^\"< ]*_${platform}\\.ipk" | sort -V | tail -n 1)"

            [ -n "$homeproxy_file" ] || { echo "Error: luci-app-homeproxy not found for ${platform}"; exit 1; }
            [ -n "$singbox_file" ] || { echo "Error: sing-box not found for ${platform}"; exit 1; }

            echo "Downloading: ${feed_url}/${homeproxy_file}"
            curl -L --fail --connect-timeout 15 --max-time 60 "${feed_url}/${homeproxy_file}" -o "makeself/homeproxy_${platform}/${homeproxy_file}" -#
            test -s "makeself/homeproxy_${platform}/${homeproxy_file}"

            echo "Downloading: ${feed_url}/${singbox_file}"
            curl -L --fail --connect-timeout 15 --max-time 60 "${feed_url}/${singbox_file}" -o "makeself/homeproxy_${platform}/${singbox_file}" -#
            test -s "makeself/homeproxy_${platform}/${singbox_file}"

            ls -lh "makeself/homeproxy_${platform}/"
          done

          # 提取版本号
          VERSION=$(ls makeself/homeproxy_x86_64/luci-app-homeproxy_*.ipk | head -n 1 | sed -n 's/.*luci-app-homeproxy_\(.*\)_all\.ipk/\1/p')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create install.sh
        run: |
          cat << 'EOF' > makeself/homeproxy_x86_64/install.sh
          #!/bin/sh
          set -e
          echo "===> 正在更新软件源..."
          opkg update
          echo "===> 正在安装 HomeProxy 依赖..."
          opkg install sing-box_*.ipk --force-depends
          echo "===> 正在安装 HomeProxy 主程序..."
          opkg install luci-app-homeproxy_*.ipk --force-depends
          echo "===> 安装完成！"
          echo "请在 LuCI 服务菜单中配置 HomeProxy"
          EOF
          chmod +x makeself/homeproxy_x86_64/install.sh
          cp makeself/homeproxy_x86_64/install.sh makeself/homeproxy_aarch64_cortex-a53/install.sh

      - name: Create self-extracting packages
        run: |
          cd makeself
          ./makeself.sh homeproxy_x86_64/ homeproxy_25.12_${{ env.VERSION }}_x86_64.run "HomeProxy Installer (25.12)" ./install.sh
          ./makeself.sh homeproxy_aarch64_cortex-a53/ homeproxy_25.12_${{ env.VERSION }}_aarch64.run "HomeProxy Installer (25.12)" ./install.sh

      - name: Create release notes
        run: |
          cat > release_notes.md << 'ENDOFFILE'
          ## HomeProxy .run (25.12)
          
          基于 sing-box 的现代化 OpenWrt 代理平台，提供简洁高效的代理配置界面。
          
          ---
          
          ## 系统要求
          
          - **固件版本**：OpenWrt 或 ImmortalWrt `25.12+`
          - **支持架构**：`x86_64`、`aarch64_cortex-a53`
          - **磁盘空间**：至少 20MB 可用空间
          - **权限要求**：root 权限
          
          ---
          
          ## 功能特性
          
          - **sing-box 核心**：基于 sing-box 代理工具，性能优异
          - **简洁界面**：提供直观的 LuCI 配置界面
          - **节点管理**：支持节点配置和管理
          - **路由规则**：支持自定义路由规则
          - **多种模式**：支持 Redirect、TProxy、TUN 等多种代理模式
          
          ---
          
          ## 安装步骤
          
          ### 通过 SSH 安装
          
          **1. 上传安装包**
          
          方式 A - 使用 SCP（推荐）：
          ```bash
          # x86_64 设备
          scp homeproxy_25.12_*_x86_64.run root@192.168.1.1:/tmp/
          
          # aarch64 设备
          scp homeproxy_25.12_*_aarch64.run root@192.168.1.1:/tmp/
          ```
          
          方式 B - 使用 WinSCP/FileZilla：
          - 连接路由器（协议：SCP，端口：22）
          - 将对应的 `.run` 文件上传到 `/tmp/` 目录
          
          **注意**：不要使用 LuCI 的"上传软件包"功能，`.run` 文件不是 IPK 包！
          
          **2. 进入临时目录**
          ```bash
          cd /tmp
          ```
          
          **3. 添加执行权限**
          ```bash
          # x86_64 设备
          chmod +x homeproxy_25.12_*_x86_64.run
          
          # aarch64 设备
          chmod +x homeproxy_25.12_*_aarch64.run
          ```
          
          **4. 执行安装**
          ```bash
          # x86_64 设备
          ./homeproxy_25.12_*_x86_64.run
          
          # aarch64 设备
          ./homeproxy_25.12_*_aarch64.run
          ```
          
          **5. 等待安装完成**
          - 安装过程会自动安装 sing-box 和 HomeProxy
          - 看到安装成功提示后继续下一步
          
          **6. 刷新 LuCI 界面**
          - 退出并重新登录 LuCI
          - 在 **服务** 菜单中找到 HomeProxy 进行配置
          
          ---
          
          ## 验证安装
          
          **检查是否安装成功**：
          ```bash
          opkg list-installed | grep homeproxy
          opkg list-installed | grep sing-box
          ```
          
          **查看服务状态**：
          ```bash
          /etc/init.d/homeproxy status
          ```
          
          ---
          
          ## 常见问题
          
          ### Q1: 安装后 LuCI 中没有 HomeProxy 菜单？
          **A**: 请刷新浏览器缓存或重新登录 LuCI。
          
          ### Q2: 如何卸载 HomeProxy？
          **A**: 
          ```bash
          opkg remove luci-app-homeproxy
          opkg remove sing-box
          ```
          
          ### Q3: 如何更新 HomeProxy？
          **A**: 下载最新版本的 `.run` 文件，重新执行安装即可。
          
          ---
          
          ## 注意事项
          
          - **依赖问题**：如提示缺少依赖，请先安装依赖包
          - **配置备份**：卸载前请备份配置文件
          - **网络设置**：安装后请根据实际需求配置代理规则
          
          ENDOFFILE

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: homeproxy-25.12-${{ env.VERSION }}
          name: "HomeProxy 25.12 ${{ env.VERSION }}"
          body_path: release_notes.md
          files: makeself/homeproxy_25.12_*.run
